name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: plateforme_assurance2
        ports:
          - 3309:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        working-directory: Plateform
        run: chmod +x mvnw

      - name: Run tests
        working-directory: Plateform
        run: |
          ./mvnw test -B \
            -Dspring.datasource.url=jdbc:mysql://localhost:3309/plateforme_assurance2 \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=root

  build-and-push-backend:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./Plateform
          push: true
          tags: |
            lifesureapp/lifesure-back:latest
            lifesureapp/lifesure-back:${{ github.sha }}

  build-and-push-fraud:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./projet-assurance-ia
          push: true
          tags: |
            lifesureapp/lifesure-fraud:latest
            lifesureapp/lifesure-fraud:${{ github.sha }}
