spring.config.import=optional:classpath:application-secret.properties

spring.datasource.url=jdbc:mysql://localhost:3309/plateforme_assurance2?createDatabaseIfNotExist=true&useUnicode=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.expiration=86400000

server.port=8090
server.address=0.0.0.0

spring.mail.host=smtp.gmail.com
spring.mail.port=587

groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=lifesure-back





spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true


# Configuration des logs
logging.level.org.springframework.security=DEBUG
logging.level.com.assurance=DEBUG

# Configuration CORS (optionnel)
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true




spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB









spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.default-encoding=UTF-8

