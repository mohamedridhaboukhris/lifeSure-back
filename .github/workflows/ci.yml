name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        working-directory: Plateform
        run: chmod +x mvnw

      - name: Compile (main + test sources)
        working-directory: Plateform
        run: ./mvnw compile test-compile -B

  build-scan-push-backend:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image locally
        uses: docker/build-push-action@v5
        with:
          context: ./Plateform
          load: true
          push: false
          tags: hamma1925/lifesure-back:${{ github.sha }}

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hamma1925/lifesure-back:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push backend to DockerHub
        run: |
          docker tag hamma1925/lifesure-back:${{ github.sha }} hamma1925/lifesure-back:latest
          docker push hamma1925/lifesure-back:${{ github.sha }}
          docker push hamma1925/lifesure-back:latest

  build-scan-push-fraud:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build fraud image locally
        uses: docker/build-push-action@v5
        with:
          context: ./projet-assurance-ia
          load: true
          push: false
          tags: hamma1925/lifesure-fraud:${{ github.sha }}

      - name: Scan fraud image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hamma1925/lifesure-fraud:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push fraud to DockerHub
        run: |
          docker tag hamma1925/lifesure-fraud:${{ github.sha }} hamma1925/lifesure-fraud:latest
          docker push hamma1925/lifesure-fraud:${{ github.sha }}
          docker push hamma1925/lifesure-fraud:latest
